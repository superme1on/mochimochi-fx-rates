name: Update MochiFX rates

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-rates.yml"
      - "scripts/**"
      - "tests/**"
      - "data/**"
      - "docs/.nojekyll"
  schedule:
    # FX week, UTC. Offset by two minutes to avoid the top-of-hour queue spike.
    - cron: "2-59/5 * * * 1-4"
    - cron: "2-59/5 0-21 * * 5"
    - cron: "2-59/5 22-23 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mochifx-pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run generator tests
        run: python3 -m unittest discover -s tests -v

      - name: Generate current game quote
        run: >-
          python3 scripts/update_rates.py
          --reference data/usdjpy-reference.json
          --output docs/rates.json

      - name: Validate generated JSON
        run: python3 -m json.tool docs/rates.json > /dev/null

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
