name: Refresh ECB reference rate

on:
  workflow_dispatch:
  schedule:
    # ECB reference rates are published once per business day. Run well after publication.
    - cron: "17 17 * * 1-5"

permissions:
  contents: write

concurrency:
  group: mochifx-reference
  cancel-in-progress: true

jobs:
  refresh-reference:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run generator tests
        run: python3 -m unittest discover -s tests -v

      - name: Refresh reference anchor
        run: python3 scripts/update_reference.py --output data/usdjpy-reference.json

      - name: Commit daily reference snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/usdjpy-reference.json
          if git diff --cached --quiet; then
            echo "Reference snapshot is unchanged."
            exit 0
          fi
          git commit -m "Update ECB USDJPY reference"
          git push
